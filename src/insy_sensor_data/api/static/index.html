<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INSY Sensor Data</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="status-panel" aria-labelledby="app-title">
        <p class="eyebrow">Mock data service</p>
        <h1 id="app-title">INSY Sensor Data</h1>
        <p id="health-status">Checking service health...</p>
        <dl class="data-status">
          <div>
            <dt>Raw Dates</dt>
            <dd id="raw-dates">...</dd>
          </div>
          <div>
            <dt>Snapshots</dt>
            <dd id="snapshot-status">...</dd>
          </div>
          <div>
            <dt>Trends</dt>
            <dd id="trend-status">...</dd>
          </div>
        </dl>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
